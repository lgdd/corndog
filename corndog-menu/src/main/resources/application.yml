server:
  port: 8080

spring:
  application:
    name: corndog-menu
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/corndog}
    username: ${SPRING_DATASOURCE_USERNAME:corndog}
    password: ${SPRING_DATASOURCE_PASSWORD:corndog123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
