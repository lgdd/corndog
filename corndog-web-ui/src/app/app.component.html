<header class="app-header">
  <div class="container header-content">
    <a routerLink="/menu" class="logo">
      <span class="logo-text">CORNDOG</span>
    </a>
    <nav class="nav-links">
      <a routerLink="/menu" routerLinkActive="active">Menu</a>
      <a routerLink="/cart" routerLinkActive="active" class="cart-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Cart
        <span class="cart-badge" *ngIf="(cartCount$ | async) as count">{{ count }}</span>
      </a>
      <a routerLink="/order-history" routerLinkActive="active">Orders</a>
      <a routerLink="/admin" routerLinkActive="active" class="admin-link">Admin</a>
      <span class="auth-controls" *ngIf="auth.isLoggedIn(); else loginBtn">
        <span class="username">{{ auth.getUsername() }}</span>
        <button class="btn-auth" (click)="logout()">Logout</button>
      </span>
      <ng-template #loginBtn>
        <button class="btn-auth" (click)="login()">Login</button>
      </ng-template>
    </nav>
  </div>
</header>
<main class="app-main">
  <div class="container">
    <router-outlet></router-outlet>
  </div>
</main>
<footer class="app-footer">
  <div class="container">
    <p>Corndog &copy; 2024 &mdash; The best corndogs on the internet</p>
  </div>
</footer>
<app-hacker-fab></app-hacker-fab>
<app-hacker-panel></app-hacker-panel>
