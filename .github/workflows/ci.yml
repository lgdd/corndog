name: Corndog CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-menu:
    name: "corndog-menu (Spring Boot)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build and test
        run: mvn clean package
        working-directory: corndog-menu
      - name: Upload test results to Datadog
        if: always()
        uses: datadog/junit-upload-github-action@v1
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          service: corndog-menu
          env: ci
          files: corndog-menu/**/target/surefire-reports/*.xml
      - name: Build Docker image
        run: docker build -t corndog/corndog-menu:latest ./corndog-menu

  build-orders:
    name: "corndog-orders (Flask)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest
        working-directory: corndog-orders
      - name: Run tests
        run: pytest --junitxml=test-results/results.xml || true
        working-directory: corndog-orders
      - name: Upload test results to Datadog
        if: always()
        uses: datadog/junit-upload-github-action@v1
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          service: corndog-orders
          env: ci
          files: corndog-orders/test-results/*.xml
      - name: Build Docker image
        run: docker build -t corndog/corndog-orders:latest ./corndog-orders

  build-admin:
    name: "corndog-admin (.NET)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - name: Restore and build
        run: dotnet build
        working-directory: corndog-admin
      - name: Run tests
        run: dotnet test --logger "trx;LogFileName=results.trx" --results-directory test-results || true
        working-directory: corndog-admin
      - name: Upload test results to Datadog
        if: always()
        uses: datadog/junit-upload-github-action@v1
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          service: corndog-admin
          env: ci
          files: corndog-admin/test-results/**/*.trx
      - name: Build Docker image
        run: docker build -t corndog/corndog-admin:latest ./corndog-admin

  build-loyalty:
    name: "corndog-loyalty (Node.js)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: corndog-loyalty
      - name: Run tests
        run: npx jest --forceExit --ci --reporters=default --reporters=jest-junit || true
        working-directory: corndog-loyalty
        env:
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_OUTPUT_NAME: results.xml
      - name: Upload test results to Datadog
        if: always()
        uses: datadog/junit-upload-github-action@v1
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          service: corndog-loyalty
          env: ci
          files: corndog-loyalty/test-results/*.xml
      - name: Build Docker image
        run: docker build -t corndog/corndog-loyalty:latest ./corndog-loyalty

  build-web-ui:
    name: "corndog-web-ui (Angular)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: corndog-web-ui
      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless || true
        working-directory: corndog-web-ui
      - name: Build
        run: npx ng build --configuration production
        working-directory: corndog-web-ui
      - name: Upload test results to Datadog
        if: always()
        uses: datadog/junit-upload-github-action@v1
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          service: corndog-web-ui
          env: ci
          files: corndog-web-ui/test-results/**/*.xml
      - name: Build Docker image
        run: docker build -t corndog/corndog-web-ui:latest ./corndog-web-ui

  static-analysis:
    name: "Datadog Static Analysis (SAST)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Datadog Static Analyzer
        id: datadog-static-analysis
        uses: DataDog/datadog-static-analyzer-github-action@v3
        with:
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_site: ${{ vars.DD_SITE || 'datadoghq.com' }}
          cpu_count: 2
          enable_performance_statistics: false

  software-composition-analysis:
    name: "Datadog SCA"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Datadog SCA
        id: datadog-sca
        uses: DataDog/datadog-sca-github-action@main
        with:
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_site: ${{ vars.DD_SITE || 'datadoghq.com' }}

  secret-scanning:
    name: "Datadog Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Datadog Secret Scanning
        id: datadog-secrets
        uses: DataDog/datadog-static-analyzer-github-action@v3
        with:
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_site: ${{ vars.DD_SITE || 'datadoghq.com' }}
          cpu_count: 2
          static_analysis_enabled: false
          secrets_enabled: true
