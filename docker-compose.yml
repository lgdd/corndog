services:
  datadog-agent:
    container_name: datadog-agent
    image: gcr.io/datadoghq/agent:latest
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE}
      - DD_ENV=${DD_ENV:-corndog-260318}
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_LOGS_CONFIG_DOCKER_CONTAINER_USE_FILE=false
      - DD_PROCESS_AGENT_PROCESS_COLLECTION_ENABLED=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_RUNTIME_SECURITY_CONFIG_ENABLED=true
      - DD_RUNTIME_SECURITY_CONFIG_NETWORK_ENABLED=true
      - DD_SYSTEM_PROBE_NETWORK_ENABLED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /etc/os-release:/host/etc/os-release:ro
    healthcheck:
      test: ["CMD-SHELL", "agent health"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8126:8126"

  corndog-db:
    container_name: corndog-db
    image: postgres:14
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_DB: corndog
      POSTGRES_USER: corndog
      POSTGRES_PASSWORD: corndog123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-corndog-260318}"
      com.datadoghq.tags.service: "corndog-db"
      com.datadoghq.tags.version: "${DD_VERSION:-1.0.0}"
      com.datadoghq.ad.check_names: '["postgres"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: >-
        [{
          "dbm": true,
          "host": "%%host%%",
          "port": 5432,
          "username": "datadog",
          "password": "datadog",
          "dbname": "corndog",
          "collect_schemas": {"enabled": true}
        }]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corndog"]
      interval: 5s
      timeout: 3s
      retries: 10

  corndog-menu:
    container_name: corndog-menu
    build:
      context: ./corndog-menu
      args:
        DD_GIT_REPOSITORY_URL: ${DD_GIT_REPOSITORY_URL:-}
        DD_GIT_COMMIT_SHA: ${DD_GIT_COMMIT_SHA:-}
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://corndog-db:5432/corndog
      SPRING_DATASOURCE_USERNAME: corndog
      SPRING_DATASOURCE_PASSWORD: corndog123
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: corndog-menu
      DD_ENV: "${DD_ENV:-corndog-260318}"
      DD_VERSION: "${DD_VERSION:-1.0.0}"
      DD_LOGS_INJECTION: "true"
      DD_DBM_PROPAGATION_MODE: full
      DD_APPSEC_ENABLED: "true"
      DD_IAST_ENABLED: "true"
      DD_APPSEC_SCA_ENABLED: "true"
      DD_CODE_ORIGIN_FOR_SPANS_ENABLED: "true"
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-corndog-260318}"
      com.datadoghq.tags.service: "corndog-menu"
      com.datadoghq.tags.version: "${DD_VERSION:-1.0.0}"
    depends_on:
      corndog-db:
        condition: service_healthy
      datadog-agent:
        condition: service_healthy

  corndog-orders:
    container_name: corndog-orders
    build:
      context: ./corndog-orders
      args:
        DD_GIT_REPOSITORY_URL: ${DD_GIT_REPOSITORY_URL:-}
        DD_GIT_COMMIT_SHA: ${DD_GIT_COMMIT_SHA:-}
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://corndog:corndog123@corndog-db:5432/corndog
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: corndog-orders
      DD_ENV: "${DD_ENV:-corndog-260318}"
      DD_VERSION: "${DD_VERSION:-1.0.0}"
      DD_LOGS_INJECTION: "true"
      DD_DBM_PROPAGATION_MODE: full
      DD_APPSEC_ENABLED: "true"
      DD_IAST_ENABLED: "true"
      DD_APPSEC_SCA_ENABLED: "true"
      DD_CODE_ORIGIN_FOR_SPANS_ENABLED: "true"
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-corndog-260318}"
      com.datadoghq.tags.service: "corndog-orders"
      com.datadoghq.tags.version: "${DD_VERSION:-1.0.0}"
    depends_on:
      corndog-db:
        condition: service_healthy
      datadog-agent:
        condition: service_healthy

  corndog-suggestions:
    container_name: corndog-suggestions
    build:
      context: ./corndog-suggestions
      args:
        DD_GIT_REPOSITORY_URL: ${DD_GIT_REPOSITORY_URL:-}
        DD_GIT_COMMIT_SHA: ${DD_GIT_COMMIT_SHA:-}
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: postgresql://corndog:corndog123@corndog-db:5432/corndog
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: corndog-suggestions
      DD_ENV: "${DD_ENV:-corndog-260318}"
      DD_VERSION: "${DD_VERSION:-1.0.0}"
      DD_LOGS_INJECTION: "true"
      DD_APPSEC_ENABLED: "true"
      DD_IAST_ENABLED: "true"
      DD_APPSEC_SCA_ENABLED: "true"
      DD_CODE_ORIGIN_FOR_SPANS_ENABLED: "true"
      DD_LLMOBS_ENABLED: "1"
      DD_LLMOBS_ML_APP: corndog-suggestions
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-corndog-260318}"
      com.datadoghq.tags.service: "corndog-suggestions"
      com.datadoghq.tags.version: "${DD_VERSION:-1.0.0}"
    depends_on:
      datadog-agent:
        condition: service_healthy

  corndog-admin:
    container_name: corndog-admin
    build:
      context: ./corndog-admin
      args:
        DD_GIT_REPOSITORY_URL: ${DD_GIT_REPOSITORY_URL:-}
        DD_GIT_COMMIT_SHA: ${DD_GIT_COMMIT_SHA:-}
    ports:
      - "5001:80"
    environment:
      ConnectionStrings__DefaultConnection: "Host=corndog-db;Port=5432;Database=corndog;Username=corndog;Password=corndog123"
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: corndog-admin
      DD_ENV: "${DD_ENV:-corndog-260318}"
      DD_VERSION: "${DD_VERSION:-1.0.0}"
      DD_LOGS_INJECTION: "true"
      DD_DBM_PROPAGATION_MODE: full
      DD_APPSEC_ENABLED: "true"
      DD_IAST_ENABLED: "true"
      DD_APPSEC_SCA_ENABLED: "true"
      DD_CODE_ORIGIN_FOR_SPANS_ENABLED: "true"
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-corndog-260318}"
      com.datadoghq.tags.service: "corndog-admin"
      com.datadoghq.tags.version: "${DD_VERSION:-1.0.0}"
    depends_on:
      corndog-db:
        condition: service_healthy
      datadog-agent:
        condition: service_healthy

  corndog-loyalty:
    container_name: corndog-loyalty
    build:
      context: ./corndog-loyalty
      args:
        DD_GIT_REPOSITORY_URL: ${DD_GIT_REPOSITORY_URL:-}
        DD_GIT_COMMIT_SHA: ${DD_GIT_COMMIT_SHA:-}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://corndog:corndog123@corndog-db:5432/corndog
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: corndog-loyalty
      DD_ENV: "${DD_ENV:-corndog-260318}"
      DD_VERSION: "${DD_VERSION:-1.0.0}"
      DD_LOGS_INJECTION: "true"
      DD_DBM_PROPAGATION_MODE: full
      DD_APPSEC_ENABLED: "true"
      DD_IAST_ENABLED: "true"
      DD_APPSEC_SCA_ENABLED: "true"
      DD_CODE_ORIGIN_FOR_SPANS_ENABLED: "true"
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-corndog-260318}"
      com.datadoghq.tags.service: "corndog-loyalty"
      com.datadoghq.tags.version: "${DD_VERSION:-1.0.0}"
    depends_on:
      corndog-db:
        condition: service_healthy
      datadog-agent:
        condition: service_healthy

  corndog-auth:
    container_name: corndog-auth
    image: quay.io/keycloak/keycloak:26.2.3
    command: >-
      start-dev --import-realm --health-enabled=true
      --log=console
      --log-console-output=json
    environment:
      KC_HTTP_RELATIVE_PATH: /auth
      KEYCLOAK_ADMIN: keycloak
      KEYCLOAK_ADMIN_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      KC_LOG_CONSOLE_JSON_FORMAT: ecs
      KC_TELEMETRY_SERVICE_NAME: corndog-auth
    ports:
      - "8180:8080"
    volumes:
      - ./corndog-auth/corndog-realm.json:/opt/keycloak/data/import/corndog-realm.json:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-corndog-260318}"
      com.datadoghq.tags.service: "corndog-auth"
      com.datadoghq.tags.version: "${DD_VERSION:-1.0.0}"
      com.datadoghq.ad.logs: '[{"source":"keycloak","service":"corndog-auth","type":"docker","auto_multi_line_detection":true}]'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    depends_on:
      datadog-agent:
        condition: service_healthy

  corndog-web-ui:
    container_name: corndog-web-ui
    build: ./corndog-web-ui
    ports:
      - "4200:80"
    environment:
      DD_APPLICATION_ID: "${DD_APPLICATION_ID:-}"
      DD_CLIENT_TOKEN: "${DD_CLIENT_TOKEN:-}"
      DD_SITE: "${DD_SITE:-datadoghq.com}"
      DD_ENV: "${DD_ENV:-corndog-260318}"
      DD_VERSION: "${DD_VERSION:-1.0.0}"
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-corndog-260318}"
      com.datadoghq.tags.service: "corndog-web-ui"
      com.datadoghq.tags.version: "${DD_VERSION:-1.0.0}"
    depends_on:
      - corndog-menu
      - corndog-orders
      - corndog-admin
      - corndog-loyalty
      - corndog-suggestions
      - corndog-auth

  corndog-traffic:
    container_name: corndog-traffic
    image: locustio/locust
    command: >-
      -f /locust/locustfile.py
      --host ${TRAFFIC_TARGET:-http://corndog-web-ui:80}
      --headless
      --users ${TRAFFIC_RATE:-10}
      --spawn-rate ${TRAFFIC_RATE:-10}
      --run-time ${TRAFFIC_DURATION:-0}
    environment:
      - TRAFFIC_LATENCY_MS=${TRAFFIC_LATENCY_MS:-0}
    volumes:
      - ./traffic/locustfile.py:/locust/locustfile.py:ro
    depends_on:
      - corndog-web-ui
    labels:
      com.datadoghq.ad.logs: '[{"source":"locust","log_processing_rules":[{"type":"exclude_at_match","name":"exclude_all","pattern":".*"}]}]'
    restart: unless-stopped

volumes:
  pgdata:
