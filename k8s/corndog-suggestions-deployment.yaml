apiVersion: apps/v1
kind: Deployment
metadata:
  name: corndog-suggestions
  namespace: corndog
  labels:
    app: corndog
    component: corndog-suggestions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corndog
      component: corndog-suggestions
  template:
    metadata:
      labels:
        app: corndog
        component: corndog-suggestions
    spec:
      containers:
        - name: corndog-suggestions
          image: corndog/corndog-suggestions:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: corndog-config
                  key: DATABASE_URL
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_SERVICE
              value: corndog-suggestions
            - name: DD_ENV
              value: corndog-260318
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_APPSEC_ENABLED
              value: "true"
            - name: DD_IAST_ENABLED
              value: "true"
            - name: DD_APPSEC_SCA_ENABLED
              value: "true"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_CODE_ORIGIN_FOR_SPANS_ENABLED
              value: "true"
            - name: DD_LLMOBS_ENABLED
              value: "1"
            - name: DD_LLMOBS_ML_APP
              value: corndog-suggestions
            - name: OPENAI_API_KEY
              value: ""
