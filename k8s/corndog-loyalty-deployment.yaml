apiVersion: apps/v1
kind: Deployment
metadata:
  name: corndog-loyalty
  namespace: corndog
  labels:
    app: corndog
    component: corndog-loyalty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corndog
      component: corndog-loyalty
  template:
    metadata:
      labels:
        app: corndog
        component: corndog-loyalty
      annotations:
        ad.datadoghq.com/corndog-loyalty.logs: '[{"source":"nodejs","service":"corndog-loyalty"}]'
    spec:
      containers:
        - name: corndog-loyalty
          image: corndog/corndog-loyalty:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: corndog-config
                  key: DATABASE_URL
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_SERVICE
              value: corndog-loyalty
            - name: DD_ENV
              value: corndog-260318
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_APPSEC_ENABLED
              value: "true"
            - name: DD_IAST_ENABLED
              value: "true"
            - name: DD_APPSEC_SCA_ENABLED
              value: "true"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_CODE_ORIGIN_FOR_SPANS_ENABLED
              value: "true"
