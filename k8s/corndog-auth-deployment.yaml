apiVersion: apps/v1
kind: Deployment
metadata:
  name: corndog-auth
  namespace: corndog
  labels:
    app: corndog
    component: corndog-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corndog
      component: corndog-auth
  template:
    metadata:
      labels:
        app: corndog
        component: corndog-auth
      annotations:
        ad.datadoghq.com/corndog-auth.logs: '[{"source":"keycloak","service":"corndog-auth"}]'
    spec:
      containers:
        - name: corndog-auth
          image: quay.io/keycloak/keycloak:26.2.3
          args:
            - start-dev
            - --import-realm
            - --http-relative-path=/auth
            - --health-enabled=true
          ports:
            - containerPort: 8080
          env:
            - name: KC_HTTP_RELATIVE_PATH
              value: /auth
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin
            - name: KC_LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /auth/realms/corndog
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: realm-config
          configMap:
            name: corndog-auth-realm
